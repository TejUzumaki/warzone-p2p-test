<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WARZONE P2P</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --raised: #1C1C1E;
    --border: #2C2C2E;
    --border-subtle: #1E1E20;
    --text: #F5F5F7;
    --text-2: #8E8E93;
    --text-3: #48484A;
    --green: #30D158;
    --amber: #FF9F0A;
    --red: #FF453A;
    --mono: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .header-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text-2);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-status {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-3);
    transition: color 0.2s;
  }
  .header-status.on { color: var(--green); }
  .header-status.linked { color: var(--amber); }
  .header-status.err { color: var(--red); }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-3);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .dot.on { background: var(--green); }
  .dot.linked { background: var(--amber); }
  .dot.err { background: var(--red); }
  .dot.pulse { animation: dotpulse 1.2s ease-in-out infinite; }
  @keyframes dotpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  /* ── Scrollable Top ── */
  .top-scroll {
    flex-shrink: 0;
    overflow-y: auto;
    max-height: 44vh;
    border-bottom: 1px solid var(--border-subtle);
  }
  .top-scroll::-webkit-scrollbar { width: 3px; }
  .top-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Sections ── */
  .sec {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .sec:last-child { border-bottom: none; }
  .sec-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── ID Row ── */
  .id-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .id-val {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── QR ── */
  .qr-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-top: 12px;
  }
  .qr-box {
    background: #fff;
    padding: 6px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 0;
  }
  .qr-box canvas { width: 76px; height: 76px; display: block; }
  .qr-text {
    font-size: 11px;
    color: var(--text-2);
    line-height: 1.55;
    padding-top: 4px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 14px;
    border-radius: 7px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    transition: opacity 0.12s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active:not(:disabled) { opacity: 0.65; }
  .btn:disabled { opacity: 0.28; cursor: default; pointer-events: none; }
  .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
  .btn-fill { background: var(--text); color: var(--bg); }
  .btn-green { background: var(--green); color: #000; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-full { width: 100%; }
  .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 5px; }
  .btn-link {
    background: none; border: none; color: var(--text-3);
    font-size: 11px; font-weight: 500; cursor: pointer; padding: 4px 0;
    font-family: var(--sans);
  }
  .btn-link:hover { color: var(--text-2); }

  /* ── Inputs ── */
  .input-row { display: flex; gap: 8px; }
  .inp {
    flex: 1;
    padding: 9px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: var(--mono);
    letter-spacing: 0.8px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  .inp:focus { border-color: #3A3A3C; }
  .inp::placeholder { color: var(--text-3); font-family: var(--sans); letter-spacing: 0; font-size: 13px; }

  /* ── Connected Banner ── */
  .conn-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .conn-banner.show { display: flex; }
  .conn-peer {
    font-size: 12px;
    color: var(--text-2);
  }
  .conn-peer strong {
    color: var(--text);
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* ── Chat Area ── */
  .chat-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 14px 20px 10px;
  }
  .chat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-3);
    text-transform: uppercase;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .chat-msgs {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 2px 0 8px;
  }
  .chat-msgs::-webkit-scrollbar { width: 3px; }
  .chat-msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { margin-bottom: 6px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg-sender { font-weight: 600; margin-right: 5px; }
  .msg-you .msg-sender { color: var(--text-3); }
  .msg-peer .msg-sender { color: var(--amber); }
  .msg-sys { color: var(--text-3); font-style: italic; font-size: 11px; }

  .chat-inp-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    padding-top: 6px;
    border-top: 1px solid var(--border-subtle);
  }
  .chat-inp {
    flex: 1;
    padding: 9px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  .chat-inp:focus { border-color: #3A3A3C; }
  .chat-inp::placeholder { color: var(--text-3); }
  .chat-inp:disabled { opacity: 0.35; }

  /* ── Voice Bar ── */
  .voice-bar {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .voice-info {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .voice-info .dot { width: 5px; height: 5px; }
  .voice-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-3);
    text-transform: uppercase;
  }
  .voice-state {
    font-size: 11px;
    color: var(--text-3);
    margin-left: auto;
    font-weight: 500;
  }
  .voice-state.active { color: var(--green); }
  .voice-state.ringing { color: var(--amber); }
  .voice-btns { display: flex; gap: 8px; }
  .voice-btns .btn { flex: 1; padding: 11px; font-size: 13px; }

  /* ── Incoming Call Overlay ── */
  .call-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 200;
  }
  .call-overlay.show { display: flex; }
  .co-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text-3);
    text-transform: uppercase;
  }
  .co-id {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text);
  }
  .co-actions { display: flex; gap: 20px; margin-top: 10px; }
  .co-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .co-btn:active { opacity: 0.7; }
  .co-btn svg { width: 22px; height: 22px; }
  .co-accept { background: var(--green); }
  .co-accept svg { stroke: #000; }
  .co-decline { background: var(--red); }
  .co-decline svg { stroke: #fff; }

  /* ── Error State ── */
  .err-note {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(255,69,58,0.08);
    border: 1px solid rgba(255,69,58,0.2);
    border-radius: 6px;
    font-size: 11px;
    color: var(--red);
    line-height: 1.5;
  }
  .err-note.show { display: block; }

  .hidden { display: none !important; }

  @media (max-width: 380px) {
    .id-val { font-size: 14px; letter-spacing: 1px; }
    .qr-box canvas { width: 60px; height: 60px; }
    .co-id { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <span class="header-title">WARZONE P2P</span>
  <div class="header-right">
    <span class="header-status" id="hdrStatus">OFFLINE</span>
    <div class="dot" id="hdrDot"></div>
  </div>
</header>

<!-- Scrollable Top Panels -->
<div class="top-scroll" id="topScroll">

  <!-- Identity -->
  <div class="sec">
    <div class="sec-label">Callsign</div>
    <div class="id-row">
      <span class="id-val" id="myId">------</span>
      <button class="btn btn-ghost btn-sm" id="copyBtn" onclick="copyId()">Copy</button>
    </div>
    <div class="err-note" id="idError">
      This callsign is in use by another session. Wait a moment and refresh, or generate a new one.
      <br><button class="btn-link" onclick="resetLockedId()" style="margin-top:4px;">Generate new callsign</button>
    </div>
    <div class="qr-row">
      <div class="qr-box"><canvas id="qrCanvas"></canvas></div>
      <div class="qr-text">Scan to connect directly. Opens this page and links automatically.</div>
    </div>
  </div>

  <!-- Connect -->
  <div class="sec" id="connectSec">
    <div class="sec-label">Link Up</div>
    <div class="input-row">
      <input type="text" class="inp" id="friendInput" placeholder="Paste callsign..." autocomplete="off" spellcheck="false">
      <button class="btn btn-fill" id="connectBtn" onclick="manualConnect()" disabled>Connect</button>
    </div>
  </div>
</div>

<!-- Connected Banner (replaces connect section when linked) -->
<div class="conn-banner" id="connBanner">
  <span class="conn-peer">Linked with <strong id="bannerPeerId">---</strong></span>
  <button class="btn-link" onclick="disconnectPeer()">Disconnect</button>
</div>

<!-- Chat Area -->
<div class="chat-wrap">
  <div class="chat-label">Text Channel</div>
  <div class="chat-msgs" id="chatBox">
    <div class="msg msg-sys">Awaiting link...</div>
  </div>
  <div class="chat-inp-row">
    <input type="text" class="chat-inp" id="msgInput" placeholder="Type a message..." disabled autocomplete="off">
    <button class="btn btn-fill" id="sendBtn" onclick="sendMsg()" disabled style="padding:9px 18px;">Send</button>
  </div>
</div>

<!-- Voice Bar -->
<div class="voice-bar">
  <div class="voice-info">
    <div class="dot" id="vDot"></div>
    <span class="voice-label">Voice</span>
    <span class="voice-state" id="vState">Standby</span>
  </div>
  <div class="voice-btns" id="vBtns">
    <button class="btn btn-green btn-full" id="callBtn" onclick="placeCall()" disabled>Call</button>
  </div>
</div>

<!-- Incoming Call Overlay -->
<div class="call-overlay" id="callOverlay">
  <div class="co-label">Incoming Call</div>
  <div class="co-id" id="coCallerId">------</div>
  <div class="co-actions">
    <button class="co-btn co-decline" onclick="declineCall()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="co-btn co-accept" onclick="acceptCall()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </button>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
let peer = null;
let conn = null;
let localStream = null;
let activeCall = null;
let incomingCallObj = null;
let friendPeerId = null;
let isMuted = false;
let voiceConnected = false;

// ═══════════════════════════════════════
// DOM References
// ═══════════════════════════════════════
const $id       = document.getElementById('myId');
const $hdrStat  = document.getElementById('hdrStatus');
const $hdrDot   = document.getElementById('hdrDot');
const $copyBtn  = document.getElementById('copyBtn');
const $idError  = document.getElementById('idError');
const $friendIn = document.getElementById('friendInput');
const $connBtn  = document.getElementById('connectBtn');
const $connSec  = document.getElementById('connectSec');
const $connBnr  = document.getElementById('connBanner');
const $bnrPeer  = document.getElementById('bannerPeerId');
const $chatBox  = document.getElementById('chatBox');
const $msgIn    = document.getElementById('msgInput');
const $sendBtn  = document.getElementById('sendBtn');
const $vDot     = document.getElementById('vDot');
const $vState   = document.getElementById('vState');
const $vBtns    = document.getElementById('vBtns');
const $overlay  = document.getElementById('callOverlay');
const $coId     = document.getElementById('coCallerId');
const $remoteAudio = document.getElementById('remoteAudio');

// Enter key on message input
 $msgIn.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
// Enter key on friend input
 $friendIn.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); manualConnect(); }
});

// ═══════════════════════════════════════
// 1. ID Lock System
// ═══════════════════════════════════════
function generateCallsign() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  function seg() {
    var s = '';
    for (var i = 0; i < 3; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return s;
  }
  return seg() + '-' + seg() + '-' + seg();
}

function getLockedId() {
  var stored = localStorage.getItem('wz-p2p-locked-id');
  if (stored) return stored;
  var fresh = generateCallsign();
  localStorage.setItem('wz-p2p-locked-id', fresh);
  return fresh;
}

function resetLockedId() {
  localStorage.removeItem('wz-p2p-locked-id');
  location.reload();
}

// ═══════════════════════════════════════
// 2. QR Code
// ═══════════════════════════════════════
function renderQR(id) {
  var url = 'https://warzone-p2p-test.vercel.app/?connect=' + encodeURIComponent(id);
  var canvas = document.getElementById('qrCanvas');
  QRCode.toCanvas(canvas, url, {
    width: 152,
    margin: 1,
    color: { dark: '#000000', light: '#FFFFFF' },
    errorCorrectionLevel: 'M'
  }, function(err) {
    if (err) console.error('QR error:', err);
  });
}

// ═══════════════════════════════════════
// 3. UI Helpers
// ═══════════════════════════════════════
function setHeader(text, cls) {
  $hdrStat.textContent = text;
  $hdrStat.className = 'header-status ' + cls;
  $hdrDot.className = 'dot ' + cls;
}

function setVoice(state) {
  // state: idle | calling | connected | incoming
  $vDot.className = 'dot';
  $vState.className = 'voice-state';
  $vBtns.innerHTML = '';

  if (state === 'idle') {
    $vState.textContent = 'Standby';
    var b = document.createElement('button');
    b.className = 'btn btn-green btn-full';
    b.textContent = 'Call';
    b.disabled = !conn || !conn.open;
    b.onclick = placeCall;
    $vBtns.appendChild(b);
  } else if (state === 'calling') {
    $vDot.className = 'dot linked pulse';
    $vState.textContent = 'Ringing';
    $vState.className = 'voice-state ringing';
    var b = document.createElement('button');
    b.className = 'btn btn-red btn-full';
    b.textContent = 'Cancel';
    b.onclick = endCall;
    $vBtns.appendChild(b);
  } else if (state === 'connected') {
    $vDot.className = 'dot on';
    $vState.textContent = 'Live';
    $vState.className = 'voice-state active';
    var m = document.createElement('button');
    m.className = 'btn btn-ghost';
    m.id = 'muteBtn';
    m.textContent = isMuted ? 'Unmute' : 'Mute';
    m.onclick = toggleMute;
    var e = document.createElement('button');
    e.className = 'btn btn-red';
    e.textContent = 'End';
    e.style.flex = '2';
    e.onclick = endCall;
    $vBtns.appendChild(m);
    $vBtns.appendChild(e);
  } else if (state === 'incoming') {
    $vDot.className = 'dot linked pulse';
    $vState.textContent = 'Incoming';
    $vState.className = 'voice-state ringing';
  }
}

function addMsg(type, text) {
  var d = document.createElement('div');
  if (type === 'sys') {
    d.className = 'msg msg-sys';
    d.textContent = text;
  } else if (type === 'you') {
    d.className = 'msg msg-you';
    d.innerHTML = '<span class="msg-sender">You</span>' + escHtml(text);
  } else {
    d.className = 'msg msg-peer';
    d.innerHTML = '<span class="msg-sender">Peer</span>' + escHtml(text);
  }
  $chatBox.appendChild(d);
  $chatBox.scrollTop = $chatBox.scrollHeight;
}

function escHtml(s) {
  var d = document.createElement('span');
  d.textContent = s;
  return d.innerHTML;
}

function setChatEnabled(on) {
  $msgIn.disabled = !on;
  $sendBtn.disabled = !on;
  if (on) $msgIn.focus();
}

function showConnected(peerId) {
  $connSec.classList.add('hidden');
  $connBnr.classList.add('show');
  $bnrPeer.textContent = peerId;
}

function showDisconnected() {
  $connSec.classList.remove('hidden');
  $connBnr.classList.remove('show');
  $friendIn.disabled = false;
  $connBtn.disabled = false;
}

// ═══════════════════════════════════════
// 4. PeerJS Core
// ═══════════════════════════════════════
function initPeer() {
  var myId = getLockedId();
  $id.textContent = myId;
  setHeader('CONNECTING', 'linked');

  peer = new Peer(myId, { debug: 0 });

  peer.on('open', function(id) {
    setHeader('ONLINE', 'on');
    $connBtn.disabled = false;
    $idError.classList.remove('show');
    renderQR(id);

    // Auto-connect from URL param
    var params = new URLSearchParams(window.location.search);
    var target = params.get('connect');
    if (target && target.trim() !== id) {
      $friendIn.value = target.trim();
      manualConnect();
      // Clean URL so refresh doesn't re-attempt
      window.history.replaceState({}, '', window.location.pathname);
    }
  });

  peer.on('connection', function(dataConn) {
    // Reject if already connected
    if (conn && conn.open) {
      dataConn.on('open', function() { dataConn.close(); });
      return;
    }
    conn = dataConn;
    friendPeerId = dataConn.peer;
    wireChat();
  });

  peer.on('call', function(call) {
    incomingCallObj = call;
    $coId.textContent = call.peer;
    $overlay.classList.add('show');
    setVoice('incoming');
  });

  peer.on('error', function(err) {
    console.error('PeerJS:', err.type, err);
    if (err.type === 'unavailable-id') {
      setHeader('ID CONFLICT', 'err');
      $idError.classList.add('show');
    } else if (err.type === 'peer-unavailable') {
      addMsg('sys', 'Peer not found. Check the callsign and try again.');
      setHeader('ONLINE', 'on');
      $friendIn.disabled = false;
      $connBtn.disabled = false;
    } else {
      setHeader('ERROR', 'err');
      addMsg('sys', 'Error: ' + err.type);
    }
  });

  peer.on('disconnected', function() {
    setHeader('RECONNECTING', 'linked');
    if (!peer.destroyed) {
      try { peer.reconnect(); } catch(e) {}
    }
  });
}

// ═══════════════════════════════════════
// 5. Connection & Text Chat
// ═══════════════════════════════════════
function manualConnect() {
  var target = $friendIn.value.trim().toUpperCase();
  if (!target) return;
  if (target === $id.textContent) {
    addMsg('sys', 'Cannot link to yourself.');
    return;
  }
  setHeader('LINKING', 'linked');
  $friendIn.disabled = true;
  $connBtn.disabled = true;

  conn = peer.connect(target, { reliable: true });
  friendPeerId = target;
  wireChat();
}

function wireChat() {
  conn.on('open', function() {
    setHeader('LINKED', 'linked');
    showConnected(friendPeerId);
    setChatEnabled(true);
    setVoice('idle');
    addMsg('sys', 'Linked with ' + friendPeerId);
  });

  conn.on('data', function(data) {
    // Handle voice control messages
    if (data && typeof data === 'object') {
      if (data.t === 'voice_end') { handleRemoteEnd(); return; }
      return;
    }
    if (typeof data === 'string') {
      addMsg('peer', data);
    }
  });

  conn.on('close', function() {
    addMsg('sys', 'Peer disconnected.');
    cleanupConnection();
  });

  conn.on('error', function(err) {
    addMsg('sys', 'Connection error.');
    cleanupConnection();
  });
}

function cleanupConnection() {
  setHeader('ONLINE', 'on');
  setChatEnabled(false);
  showDisconnected();
  friendPeerId = null;
  conn = null;
  if (voiceConnected) endCall();
  setVoice('idle');
}

function disconnectPeer() {
  if (conn) { try { conn.close(); } catch(e) {} }
  cleanupConnection();
  addMsg('sys', 'Disconnected.');
}

function sendMsg() {
  var txt = $msgIn.value.trim();
  if (!txt || !conn || !conn.open) return;
  conn.send(txt);
  addMsg('you', txt);
  $msgIn.value = '';
}

function copyId() {
  var txt = $id.textContent;
  navigator.clipboard.writeText(txt).then(function() {
    $copyBtn.textContent = 'Copied';
    setTimeout(function() { $copyBtn.textContent = 'Copy'; }, 1400);
  }).catch(function() {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    $copyBtn.textContent = 'Copied';
    setTimeout(function() { $copyBtn.textContent = 'Copy'; }, 1400);
  });
}

// ═══════════════════════════════════════
// 6. Voice Calls
// ═══════════════════════════════════════
function getMicStream() {
  if (localStream && localStream.active) return Promise.resolve(localStream);
  return navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    .then(function(stream) {
      localStream = stream;
      return stream;
    })
    .catch(function(err) {
      alert('Microphone access is required for voice calls.');
      throw err;
    });
}

function placeCall() {
  if (!friendPeerId || !conn || !conn.open) return;
  setVoice('calling');

  getMicStream().then(function(stream) {
    activeCall = peer.call(friendPeerId, stream);
    if (!activeCall) {
      addMsg('sys', 'Call failed to initiate.');
      setVoice('idle');
      return;
    }
    activeCall.on('stream', function(remote) {
      $remoteAudio.srcObject = remote;
      voiceConnected = true;
      setVoice('connected');
      addMsg('sys', 'Voice channel open.');
    });
    activeCall.on('close', function() {
      handleRemoteEnd();
    });
    activeCall.on('error', function(err) {
      console.error('Call error:', err);
      addMsg('sys', 'Call error.');
      handleRemoteEnd();
    });
  }).catch(function() {
    setVoice('idle');
  });
}

function acceptCall() {
  $overlay.classList.remove('show');
  if (!incomingCallObj) return;

  getMicStream().then(function(stream) {
    activeCall = incomingCallObj;
    incomingCallObj = null;
    activeCall.answer(stream);
    activeCall.on('stream', function(remote) {
      $remoteAudio.srcObject = remote;
      voiceConnected = true;
      setVoice('connected');
      addMsg('sys', 'Voice channel open.');
    });
    activeCall.on('close', function() {
      handleRemoteEnd();
    });
    activeCall.on('error', function(err) {
      console.error('Call error:', err);
      handleRemoteEnd();
    });
  }).catch(function() {
    // Mic denied
    if (incomingCallObj) { try { incomingCallObj.close(); } catch(e) {} }
    incomingCallObj = null;
    $overlay.classList.remove('show');
    setVoice('idle');
  });
}

function declineCall() {
  $overlay.classList.remove('show');
  if (incomingCallObj) {
    try { incomingCallObj.close(); } catch(e) {}
    incomingCallObj = null;
  }
  setVoice('idle');
}

function endCall() {
  // Notify peer
  if (conn && conn.open) {
    try { conn.send({ t: 'voice_end' }); } catch(e) {}
  }
  if (activeCall) {
    try { activeCall.close(); } catch(e) {}
    activeCall = null;
  }
  handleRemoteEnd();
}

function handleRemoteEnd() {
  voiceConnected = false;
  isMuted = false;
  if (activeCall) {
    try { activeCall.close(); } catch(e) {}
    activeCall = null;
  }
  $remoteAudio.srcObject = null;
  $overlay.classList.remove('show');
  if (conn && conn.open) {
    setVoice('idle');
  } else {
    setVoice('idle');
  }
}

function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(function(t) { t.enabled = !isMuted; });
  var btn = document.getElementById('muteBtn');
  if (btn) btn.textContent = isMuted ? 'Unmute' : 'Mute';
}

// ═══════════════════════════════════════
// 7. Init
// ═══════════════════════════════════════
initPeer();
</script>
